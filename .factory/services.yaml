commands:
  install: "bun install --frozen-lockfile"
  typecheck: "bun run typecheck"
  build: "bun run build"
  lint: "bun run lint"
  test: "TMPDIR=/home/whoami/dev/opengecko/openGecko/data bun run test -- --maxWorkers=2 tests/runtime-diagnostics.test.ts tests/market-runtime.test.ts tests/market-freshness.test.ts tests/simple-price-parity.test.ts tests/coins-markets-parity.test.ts tests/coin-detail-parity.test.ts tests/stale-data.test.ts tests/app.test.ts"
  full_test: "TMPDIR=/home/whoami/dev/opengecko/openGecko/data bun run test -- --maxWorkers=2"
  endpoint_smoke: "BASE_URL=http://localhost:3001 /usr/bin/env bash scripts/test-endpoints.sh"
  endpoint_simple: "BASE_URL=http://localhost:3001 /usr/bin/env bash scripts/modules/simple/simple.sh"
  endpoint_coins: "BASE_URL=http://localhost:3001 /usr/bin/env bash scripts/modules/coins/coins.sh"

services:
  api:
    start: "PORT=3001 HOST=127.0.0.1 DATABASE_URL=./data/opengecko.db CCXT_EXCHANGES=binance,coinbase,okx LOG_LEVEL=error bun run src/server.ts"
    stop: "lsof -ti :3001 | xargs kill 2>/dev/null || true"
    healthcheck: "curl -sf http://localhost:3001/ping"
    port: 3001
    depends_on: []

  validation-api:
    start: "OPEN_GECKO_DISABLE_REPO_DOTENV=1 PORT=3102 HOST=127.0.0.1 DATABASE_URL=:memory: CCXT_EXCHANGES='' LOG_LEVEL=error bun run src/server.ts"
    stop: "lsof -ti :3102 | xargs kill 2>/dev/null || true"
    healthcheck: "curl -sf http://localhost:3102/ping"
    port: 3102
    depends_on: []
