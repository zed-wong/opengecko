commands:
  install: bun install --frozen-lockfile
  typecheck: bun run typecheck
  build: bun run build
  test: TMPDIR=/home/whoami/dev/openGecko/data bun run test -- --maxWorkers=4
  lint: echo "no lint configured"

services:
  api:
    start: PORT=3100 HOST=127.0.0.1 CCXT_EXCHANGES=binance,coinbase,okx LOG_LEVEL=error bun run src/server.ts
    stop: lsof -ti :3100 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100/ping
    port: 3100
    depends_on: []

  api-validation:
    start: PORT=3102 HOST=127.0.0.1 DATABASE_URL=:memory: CCXT_EXCHANGES='' LOG_LEVEL=error bun run src/server.ts
    stop: lsof -ti :3102 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3102/ping
    port: 3102
    depends_on: []
